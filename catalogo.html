<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maya | Catálogo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --peach: #E8856A;
      --peach-light: #F2A98E;
      --peach-pale: #F9DDD4;
      --peach-deep: #C45E42;
      --white: #FEFAF8;
      --off: #F5EDE8;
      --dark: #2A1F1A;
      --mid: #7A5A4E;
      --light: #C4A090;
      --line: rgba(232, 133, 106, 0.22);
      --shadow: 0 24px 70px rgba(42, 31, 26, 0.08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--white);
      color: var(--dark);
      font-family: "Jost", Arial, sans-serif;
      font-weight: 300;
    }

    button,
    input,
    select {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      background: var(--dark);
      color: var(--white);
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .brand {
      padding: 10px 4px 22px;
      border-bottom: 1px solid rgba(254, 250, 248, 0.14);
    }

    .brand-mark {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 46px;
      line-height: 1;
      letter-spacing: 4px;
    }

    .brand-sub {
      margin-top: 12px;
      color: rgba(254, 250, 248, 0.62);
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    .control-group {
      display: grid;
      gap: 12px;
    }

    .label,
    .field span,
    .stat span,
    .chip-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .label {
      color: var(--peach-light);
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field span {
      color: rgba(254, 250, 248, 0.6);
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 42px;
      border: 1px solid rgba(254, 250, 248, 0.13);
      border-radius: var(--radius);
      background: rgba(254, 250, 248, 0.07);
      color: var(--white);
      padding: 10px 12px;
      outline: none;
    }

    .field option {
      color: var(--dark);
    }

    .field input:focus,
    .field select:focus {
      border-color: rgba(242, 169, 142, 0.62);
      background: rgba(254, 250, 248, 0.1);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .primary-button,
    .ghost-button {
      min-height: 42px;
      border-radius: var(--radius);
      padding: 0 14px;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .primary-button {
      background: var(--peach);
      color: var(--white);
      box-shadow: 0 12px 26px rgba(232, 133, 106, 0.24);
    }

    .ghost-button {
      background: transparent;
      color: rgba(254, 250, 248, 0.76);
      border: 1px solid rgba(254, 250, 248, 0.13);
    }

    .primary-button:hover,
    .ghost-button:hover {
      transform: translateY(-1px);
    }

    .primary-button:hover {
      background: var(--peach-deep);
    }

    .ghost-button:hover {
      border-color: rgba(242, 169, 142, 0.45);
      color: var(--white);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      border: 1px solid rgba(254, 250, 248, 0.1);
      border-radius: var(--radius);
      padding: 16px 12px;
      background: rgba(254, 250, 248, 0.045);
    }

    .stat strong {
      display: block;
      color: var(--peach-light);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      line-height: 1;
      font-weight: 400;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: rgba(254, 250, 248, 0.54);
    }

    .status {
      min-height: 42px;
      border: 1px solid rgba(254, 250, 248, 0.1);
      border-radius: var(--radius);
      padding: 12px;
      color: rgba(254, 250, 248, 0.68);
      font-size: 12px;
      line-height: 1.45;
    }

    .category-order {
      display: grid;
      gap: 7px;
    }

    .category-order-row {
      min-height: 40px;
      border: 1px solid rgba(254, 250, 248, 0.1);
      border-radius: var(--radius);
      background: rgba(254, 250, 248, 0.045);
      display: grid;
      grid-template-columns: 1fr 34px 34px;
      gap: 6px;
      align-items: center;
      padding: 6px 7px 6px 12px;
    }

    .category-order-row span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: rgba(254, 250, 248, 0.78);
      font-size: 12px;
    }

    .order-button {
      width: 34px;
      height: 28px;
      border-radius: 6px;
      background: rgba(254, 250, 248, 0.08);
      border: 1px solid rgba(254, 250, 248, 0.12);
      color: rgba(254, 250, 248, 0.78);
      display: grid;
      place-items: center;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
    }

    .order-button:hover:not(:disabled) {
      border-color: rgba(242, 169, 142, 0.45);
      color: var(--white);
    }

    .order-button:disabled {
      opacity: 0.34;
      cursor: default;
    }

    .main {
      min-width: 0;
      padding: 28px;
      display: grid;
      gap: 22px;
    }

    .topbar {
      min-height: 76px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 22px;
    }

    .page-title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(38px, 6vw, 78px);
      line-height: 0.96;
      font-weight: 400;
      letter-spacing: 1px;
    }

    .page-meta {
      color: var(--light);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: right;
    }

    .catalog-stage {
      display: grid;
      justify-content: center;
      gap: 18px;
    }

    .sheet {
      width: min(100%, 960px);
      background: var(--white);
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
    }

    .catalog-page {
      width: 210mm;
      min-height: 297mm;
      padding: 16mm;
      background: var(--white);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 13mm;
      page-break-after: always;
      break-after: page;
    }

    .cover {
      min-height: 297mm;
      align-content: stretch;
      grid-template-rows: 1fr auto;
      background: var(--peach);
      color: var(--white);
    }

    .cover-hero {
      display: grid;
      place-items: center;
      text-align: center;
      border: 1px solid rgba(254, 250, 248, 0.32);
      padding: 18mm;
    }

    .cover-brand {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28mm;
      line-height: 0.88;
      letter-spacing: 2mm;
      font-weight: 400;
    }

    .cover-title {
      margin-top: 11mm;
      color: var(--white);
      font-size: 4mm;
      letter-spacing: 2.4mm;
      text-transform: uppercase;
    }

    .cover-note {
      max-width: 112mm;
      margin: 10mm auto 0;
      color: rgba(254, 250, 248, 0.82);
      font-size: 4.2mm;
      line-height: 1.65;
    }

    .cover-footer,
    .page-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8mm;
      color: var(--light);
      font-size: 3mm;
      letter-spacing: 1.4mm;
      text-transform: uppercase;
    }

    .cover-footer {
      color: rgba(254, 250, 248, 0.78);
    }

    .page-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 10mm;
      border-bottom: 1px solid var(--line);
      padding-bottom: 6mm;
    }

    .section-title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 14mm;
      line-height: 1;
      font-weight: 400;
    }

    .section-kicker {
      color: var(--peach-deep);
      font-size: 3mm;
      letter-spacing: 1.8mm;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6mm;
    }

    .product-card {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 3mm;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .product-image {
      width: 100%;
      aspect-ratio: 1;
      border: 1px solid rgba(232, 133, 106, 0.18);
      background: var(--off);
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .product-body {
      display: grid;
      gap: 1.6mm;
    }

    .product-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 4mm;
    }

    .product-name {
      min-width: 0;
      font-size: 3.6mm;
      line-height: 1.14;
      font-weight: 400;
    }

    .product-price {
      color: var(--peach-deep);
      font-size: 3.15mm;
      font-weight: 400;
      white-space: nowrap;
    }

    .product-code {
      color: var(--light);
      font-size: 2.35mm;
      letter-spacing: 1.2mm;
      text-transform: uppercase;
    }

    .sheet[data-density="8"] .products-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 5mm;
    }

    .sheet[data-density="8"] .product-name {
      font-size: 3.15mm;
    }

    .sheet[data-density="8"] .product-price {
      font-size: 2.85mm;
    }

    .sheet[data-density="8"] .product-code {
      font-size: 2mm;
    }

    a.product-code {
      text-decoration: none;
      border-bottom: 1px solid rgba(196, 160, 144, 0.45);
      width: fit-content;
    }

    .empty-catalog {
      min-height: 420px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      color: var(--light);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      padding: 30px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      background: var(--dark);
      color: var(--white);
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1180px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
      }
      .control-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
      .catalog-page {
        width: min(100%, 210mm);
        min-height: auto;
      }
    }

    @media (max-width: 760px) {
      .main { padding: 18px; }
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }
      .page-meta { text-align: left; }
      .control-grid { grid-template-columns: 1fr; }
      .button-row { grid-template-columns: 1fr; }
      .catalog-page {
        padding: 18px;
        gap: 26px;
      }
      .cover { min-height: 720px; }
      .cover-brand { font-size: 64px; }
      .cover-title { font-size: 11px; }
      .cover-note { font-size: 15px; }
      .page-head {
        align-items: start;
        flex-direction: column;
      }
      .section-title { font-size: 42px; }
      .products-grid { grid-template-columns: 1fr; }
    }

    @page {
      size: A4 portrait;
      margin: 0;
    }

    @media print {
      html,
      body {
        background: var(--white);
        width: 210mm;
        margin: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .sidebar,
      .topbar,
      .toast {
        display: none !important;
      }
      .app-shell,
      .main,
      .catalog-stage,
      .sheet {
        display: block;
        padding: 0;
        margin: 0;
        width: 210mm;
        max-width: none;
        box-shadow: none;
        border: 0;
      }
      .catalog-page {
        width: 210mm;
        height: 297mm;
        min-height: 297mm;
        padding: 14mm;
        overflow: hidden;
        box-shadow: none;
        border: 0;
        page-break-after: always;
        break-after: page;
        page-break-inside: avoid;
        break-inside: avoid;
      }
      .catalog-page:last-child {
        page-break-after: auto;
        break-after: auto;
      }
      .cover {
        background: var(--peach) !important;
        color: var(--white) !important;
      }
      .cover-hero {
        border-color: rgba(254, 250, 248, 0.36);
      }
      .page-head {
        align-items: end;
        flex-direction: row;
      }
      .section-title {
        font-size: 14mm;
      }
      .products-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
        gap: 6mm !important;
      }
      .sheet[data-density="8"] .products-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
        gap: 5mm !important;
      }
      .product-image {
        width: 100% !important;
        height: auto !important;
        aspect-ratio: 1 !important;
        object-fit: cover !important;
        object-position: center !important;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">MAYA</div>
        <div class="brand-sub">Catálogo em PDF</div>
      </div>

      <div class="control-group">
        <div class="label">Fonte</div>
        <label class="field">
          <span>Sheets publicado</span>
          <input id="sheetUrl" type="url" placeholder="https://docs.google.com/spreadsheets/...">
        </label>
        <div class="button-row">
          <button class="primary-button" type="button" id="loadSheet">Carregar</button>
          <button class="ghost-button" type="button" id="sampleData">Exemplo</button>
        </div>
      </div>

      <div class="control-group control-grid">
        <label class="field">
          <span>Coleção</span>
          <select id="collectionFilter">
            <option value="all">Todas</option>
          </select>
        </label>
        <label class="field">
          <span>Categoria</span>
          <select id="categoryFilter">
            <option value="all">Todas</option>
          </select>
        </label>
        <label class="field">
          <span>Formato</span>
          <select id="density">
            <option value="6">6 por página</option>
            <option value="8">8 por página</option>
          </select>
        </label>
        <label class="field">
          <span>Contato</span>
          <input id="contactLine" type="text" value="@maya | whatsapp">
        </label>
      </div>

      <div class="control-group">
        <div class="label">Ordem das categorias</div>
        <div class="category-order" id="categoryOrder"></div>
      </div>

      <div class="control-group">
        <div class="label">Resumo</div>
        <div class="stats">
          <div class="stat"><strong id="totalProducts">0</strong><span>produtos</span></div>
          <div class="stat"><strong id="totalPages">0</strong><span>páginas</span></div>
        </div>
      </div>

      <div class="control-group">
        <button class="primary-button" type="button" id="printPdf">Gerar PDF</button>
        <div class="status" id="status">Pronto para carregar a planilha.</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1 class="page-title">Catálogo Maya</h1>
        <div class="page-meta" id="updatedAt">Aguardando dados</div>
      </header>

      <section class="catalog-stage">
        <div class="sheet" id="catalog"></div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const CONFIG_KEY = "maya-catalog-config-v1";
    const DEFAULT_SHEET_URL = "https://docs.google.com/spreadsheets/d/1VhIJVylpKAHnLfjBgopYRqd4nSM6d56d2xnlrwHgm4o/edit?gid=0#gid=0";
    const REQUIRED_COLUMNS = {
      name: ["nome", "produto", "titulo", "title", "name"],
      price: ["preco", "preço", "preco venda", "preço venda", "preco de venda", "preço de venda", "valor", "valor venda", "valor de venda", "valor unitario", "valor unitário", "preco final", "preço final", "price"],
      description: ["descricao", "descrição", "descrição curta", "descricao curta", "description"],
      image: ["foto", "imagem", "image", "link foto", "link da foto"],
      category: ["categoria", "category"],
      collection: ["colecao", "coleção", "collection"],
      status: ["status", "ativo", "publicar", "exibir"],
      stock: ["estoque", "estoque atual", "em estoque", "qtd", "quantidade", "quantidade estoque", "saldo", "disponivel", "disponível", "stock", "inventory"],
      order: ["ordem", "order", "posicao", "posição"],
      code: ["codigo", "código", "sku", "referencia", "referência"],
      link: ["link", "url", "produto link", "link produto"]
    };

    let products = [];
    let state = loadConfig();

    const els = {
      sheetUrl: document.querySelector("#sheetUrl"),
      collectionFilter: document.querySelector("#collectionFilter"),
      categoryFilter: document.querySelector("#categoryFilter"),
      density: document.querySelector("#density"),
      contactLine: document.querySelector("#contactLine"),
      categoryOrder: document.querySelector("#categoryOrder"),
      totalProducts: document.querySelector("#totalProducts"),
      totalPages: document.querySelector("#totalPages"),
      updatedAt: document.querySelector("#updatedAt"),
      status: document.querySelector("#status"),
      catalog: document.querySelector("#catalog"),
      toast: document.querySelector("#toast")
    };

    function loadConfig() {
      try {
        return JSON.parse(localStorage.getItem(CONFIG_KEY)) || {};
      } catch (error) {
        return {};
      }
    }

    function saveConfig() {
      state = {
        sheetUrl: els.sheetUrl.value.trim(),
        collection: els.collectionFilter.value,
        category: els.categoryFilter.value,
        density: els.density.value,
        contact: els.contactLine.value.trim(),
        categoryOrder: state.categoryOrder || []
      };
      localStorage.setItem(CONFIG_KEY, JSON.stringify(state));
    }

    function escapeHtml(value = "") {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function fixEncoding(value = "") {
      const text = String(value);
      if (!/[ÃÂâ]/.test(text)) return text;

      try {
        const bytes = Uint8Array.from([...text].map(char => char.charCodeAt(0) & 255));
        const decoded = new TextDecoder("utf-8", { fatal: true }).decode(bytes);
        return decoded || text;
      } catch (error) {
        return text;
      }
    }

    function normalizeKey(value = "") {
      return String(value)
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ");
    }

    function findColumn(headers, names) {
      const normalizedHeaders = headers.map(normalizeKey);
      const normalizedNames = names.map(normalizeKey);
      const exactIndex = normalizedHeaders.findIndex(header => normalizedNames.includes(header));
      if (exactIndex >= 0) return headers[exactIndex];

      const partialIndex = normalizedHeaders.findIndex(header =>
        normalizedNames.some(name => header.includes(name) || name.includes(header))
      );
      return partialIndex >= 0 ? headers[partialIndex] : "";
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;

      for (let index = 0; index < text.length; index += 1) {
        const char = text[index];
        const next = text[index + 1];

        if (char === '"' && quoted && next === '"') {
          cell += '"';
          index += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (char === "\r" && next === "\n") index += 1;
          row.push(cell);
          if (row.some(value => value.trim())) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      row.push(cell);
      if (row.some(value => value.trim())) rows.push(row);
      return rows;
    }

    function toCsvUrl(url) {
      const trimmed = url.trim();
      if (!trimmed) return "";
      if (trimmed.includes("output=csv") || trimmed.endsWith(".csv")) return trimmed;

      const id = trimmed.match(/\/spreadsheets\/d\/([^/]+)/)?.[1];
      const gid = trimmed.match(/[?&]gid=([^&]+)/)?.[1] || "0";
      if (id && trimmed.includes("/pubhtml")) return `https://docs.google.com/spreadsheets/d/${id}/pub?gid=${gid}&single=true&output=csv`;
      if (id) return `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;

      return trimmed;
    }

    function driveImageUrl(url = "") {
      const value = String(url).trim();
      if (!value) return "";

      const id =
        value.match(/\/file\/d\/([^/]+)/)?.[1] ||
        value.match(/[?&]id=([^&]+)/)?.[1] ||
        value.match(/uc\?export=view&id=([^&]+)/)?.[1];

      if (id) return `https://drive.google.com/thumbnail?id=${id}&sz=w1200`;
      return value;
    }

    function rowIsActive(product) {
      const value = normalizeKey(product.status || "");
      if (!value) return true;
      return !["nao", "não", "no", "false", "0", "inativo", "ocultar", "esgotado"].includes(value);
    }

    function parseStock(value = "") {
      const normalized = String(value)
        .trim()
        .replace(/\./g, "")
        .replace(",", ".");

      if (!normalized) return null;

      const number = Number(normalized.match(/-?\d+(\.\d+)?/)?.[0]);
      return Number.isFinite(number) ? number : null;
    }

    function formatPrice(value = "") {
      const raw = String(value).trim();
      if (!raw) return "";
      if (/[a-zA-Z$€£]/.test(raw)) return raw;

      const normalized = raw
        .replace(/\s/g, "")
        .replace(/\./g, "")
        .replace(",", ".");
      const number = Number(normalized.match(/-?\d+(\.\d+)?/)?.[0]);

      if (!Number.isFinite(number)) return raw;
      return new Intl.NumberFormat("pt-BR", {
        style: "currency",
        currency: "BRL"
      }).format(number);
    }

    function rowHasStock(product) {
      if (!product.hasStockColumn) return true;
      return product.stock >= 1;
    }

    function mapRows(rows) {
      const headers = rows[0] || [];
      const columns = Object.fromEntries(
        Object.entries(REQUIRED_COLUMNS).map(([key, names]) => [key, findColumn(headers, names)])
      );

      return rows.slice(1).map(row => {
        const record = Object.fromEntries(headers.map((header, index) => [header, row[index] || ""]));
        const get = key => fixEncoding(record[columns[key]] || "");

        return {
          name: get("name").trim(),
          price: formatPrice(get("price")),
          description: get("description").trim(),
          image: driveImageUrl(get("image")),
          category: get("category").trim() || "Produtos",
          collection: get("collection").trim() || "Catálogo",
          status: get("status").trim(),
          stock: parseStock(get("stock")),
          hasStockColumn: Boolean(columns.stock),
          order: Number(get("order")) || 9999,
          code: get("code").trim(),
          link: get("link").trim()
        };
      })
        .filter(product => product.name)
        .filter(rowIsActive)
        .filter(rowHasStock);
    }

    async function loadSheet() {
      const url = toCsvUrl(els.sheetUrl.value);
      if (!url) {
        showToast("Cole o link do Sheets");
        return;
      }

      setStatus("Carregando planilha...");
      saveConfig();

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        const rows = parseCsv(text);
        if (rows.length < 2) throw new Error("Planilha vazia");
        products = mapRows(rows);
        updateFilters();
        render();
        setStatus(`${products.length} produtos carregados.`);
        showToast("Catálogo atualizado");
      } catch (error) {
        setStatus("Não foi possível carregar. Verifique se o Sheets está publicado na web.");
        showToast("Erro ao carregar");
      }
    }

    function uniqueValues(key) {
      return [...new Set(products.map(product => product[key]).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b));
    }

    function syncCategoryOrder() {
      const categories = uniqueValues("category");
      const saved = Array.isArray(state.categoryOrder) ? state.categoryOrder : [];
      if (!categories.length) {
        state.categoryOrder = saved;
        return;
      }
      state.categoryOrder = [
        ...saved.filter(category => categories.includes(category)),
        ...categories.filter(category => !saved.includes(category))
      ];
      saveConfig();
    }

    function updateSelect(select, values, selected) {
      const current = selected || select.value || "all";
      select.innerHTML = `<option value="all">Todas</option>${values.map(value => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`).join("")}`;
      select.value = values.includes(current) ? current : "all";
    }

    function updateFilters() {
      syncCategoryOrder();
      updateSelect(els.collectionFilter, uniqueValues("collection"), state.collection);
      updateSelect(els.categoryFilter, uniqueValues("category"), state.category);
      renderCategoryOrder();
    }

    function renderCategoryOrder() {
      const categories = state.categoryOrder || [];
      if (!categories.length) {
        els.categoryOrder.innerHTML = `<div class="status">Carregue a planilha para ordenar.</div>`;
        return;
      }

      els.categoryOrder.innerHTML = categories.map((category, index) => `
        <div class="category-order-row">
          <span>${escapeHtml(category)}</span>
          <button class="order-button" type="button" data-category-move="${index}" data-direction="-1" aria-label="Subir ${escapeHtml(category)}" ${index === 0 ? "disabled" : ""}>↑</button>
          <button class="order-button" type="button" data-category-move="${index}" data-direction="1" aria-label="Descer ${escapeHtml(category)}" ${index === categories.length - 1 ? "disabled" : ""}>↓</button>
        </div>
      `).join("");
    }

    function moveCategory(index, direction) {
      const categories = [...(state.categoryOrder || [])];
      const nextIndex = index + direction;
      if (nextIndex < 0 || nextIndex >= categories.length) return;
      const [moved] = categories.splice(index, 1);
      categories.splice(nextIndex, 0, moved);
      state.categoryOrder = categories;
      saveConfig();
      renderCategoryOrder();
      render();
    }

    function filteredProducts() {
      const collection = els.collectionFilter.value;
      const category = els.categoryFilter.value;
      const order = state.categoryOrder || [];
      return products
        .filter(product => collection === "all" || product.collection === collection)
        .filter(product => category === "all" || product.category === category)
        .sort((a, b) => {
          const aRank = order.includes(a.category) ? order.indexOf(a.category) : order.length;
          const bRank = order.includes(b.category) ? order.indexOf(b.category) : order.length;
          const categoryOrder = aRank - bRank;
          if (categoryOrder !== 0) return categoryOrder;
          return a.order - b.order || a.name.localeCompare(b.name);
        });
    }

    function chunk(items, size) {
      const chunks = [];
      for (let index = 0; index < items.length; index += size) {
        chunks.push(items.slice(index, index + size));
      }
      return chunks;
    }

    function groupedPages(items, perPage) {
      const groups = [];
      const categoryOrder = state.categoryOrder || [];
      const categories = [...new Set(items.map(product => product.category).filter(Boolean))]
        .sort((a, b) => {
          const aRank = categoryOrder.includes(a) ? categoryOrder.indexOf(a) : categoryOrder.length;
          const bRank = categoryOrder.includes(b) ? categoryOrder.indexOf(b) : categoryOrder.length;
          return aRank - bRank || a.localeCompare(b);
        });

      categories.forEach(category => {
        chunk(items.filter(product => product.category === category), perPage).forEach((page, index) => {
          groups.push({ category, page, categoryPage: index + 1 });
        });
      });

      return groups;
    }

    function coverTitle(items) {
      const collection = els.collectionFilter.value;
      if (collection !== "all") return collection;
      const collections = [...new Set(items.map(product => product.collection).filter(Boolean))];
      return collections.length === 1 ? collections[0] : "Catálogo";
    }

    function productImage(product) {
      if (product.image) {
        return `<img class="product-image" src="${escapeHtml(product.image)}" alt="${escapeHtml(product.name)}" loading="eager" decoding="sync">`;
      }
      return `<div class="product-image" aria-label="${escapeHtml(product.name)}"></div>`;
    }

    function productCard(product) {
      const detail = product.link
        ? `<a class="product-code" href="${escapeHtml(product.link)}" target="_blank" rel="noreferrer">${escapeHtml(product.code || "Ver produto")}</a>`
        : `<div class="product-code">${escapeHtml(product.code || product.category)}</div>`;

      return `
        <article class="product-card">
          ${productImage(product)}
          <div class="product-body">
            <div class="product-top">
              <div class="product-name">${escapeHtml(product.name)}</div>
              <div class="product-price">${escapeHtml(product.price || "Sob consulta")}</div>
            </div>
            ${detail}
          </div>
        </article>
      `;
    }

    function render() {
      saveConfig();
      const items = filteredProducts();
      const perPage = Number(els.density.value) || 6;
      const pages = groupedPages(items, perPage);
      const totalPageCount = items.length ? pages.length + 1 : 0;
      const now = new Intl.DateTimeFormat("pt-BR", { day: "2-digit", month: "short", year: "numeric" }).format(new Date()).replace(".", "");

      els.catalog.dataset.density = String(perPage);
      els.totalProducts.textContent = items.length;
      els.totalPages.textContent = totalPageCount;
      els.updatedAt.textContent = items.length ? `Atualizado em ${now}` : "Aguardando dados";

      if (!items.length) {
        els.catalog.innerHTML = `<div class="empty-catalog">Carregue a planilha ou use dados de exemplo</div>`;
        return;
      }

      const contact = els.contactLine.value.trim() || "@maya | whatsapp";
      const title = coverTitle(items);

      els.catalog.innerHTML = `
        <section class="catalog-page cover">
          <div class="cover-hero">
            <div>
              <div class="cover-brand">MAYA</div>
              <div class="cover-title">${escapeHtml(title)}</div>
              <div class="cover-note">Seleção de produtos disponíveis para pedido. Valores e disponibilidade podem mudar conforme estoque.</div>
            </div>
          </div>
          <div class="cover-footer">
            <span>${escapeHtml(contact)}</span>
            <span>${escapeHtml(now)}</span>
          </div>
        </section>
        ${pages.map((group, index) => `
          <section class="catalog-page">
            <header class="page-head">
              <h2 class="section-title">${escapeHtml(group.category)}</h2>
              <div class="section-kicker">Maya · ${String(index + 1).padStart(2, "0")}</div>
            </header>
            <div class="products-grid">
              ${group.page.map(productCard).join("")}
            </div>
            <footer class="page-footer">
              <span>${escapeHtml(contact)}</span>
              <span>${escapeHtml(title)}</span>
            </footer>
          </section>
        `).join("")}
      `;
    }

    function setStatus(message) {
      els.status.textContent = message;
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 1800);
    }

    function waitForImages() {
      const images = [...els.catalog.querySelectorAll("img")];
      const pending = images
        .filter(image => !image.complete)
        .map(image => new Promise(resolve => {
          image.addEventListener("load", resolve, { once: true });
          image.addEventListener("error", resolve, { once: true });
        }));

      return Promise.all(pending);
    }

    function applyInitialState() {
      els.sheetUrl.value = state.sheetUrl || DEFAULT_SHEET_URL;
      els.density.value = state.density || "6";
      els.contactLine.value = state.contact || "@maya | whatsapp";
      updateFilters();
      render();
      if (els.sheetUrl.value) loadSheet();
    }

    document.querySelector("#loadSheet").addEventListener("click", loadSheet);
    document.querySelector("#sampleData").addEventListener("click", loadSample);
    document.querySelector("#printPdf").addEventListener("click", async () => {
      saveConfig();
      setStatus("Preparando imagens para o PDF...");
      await waitForImages();
      setStatus("Imagens prontas. Abrindo impressão...");
      window.print();
      setStatus(`${filteredProducts().length} produtos carregados.`);
    });

    [els.collectionFilter, els.categoryFilter, els.density, els.contactLine].forEach(element => {
      element.addEventListener("input", render);
    });

    els.categoryOrder.addEventListener("click", event => {
      const button = event.target.closest("[data-category-move]");
      if (!button) return;
      moveCategory(Number(button.dataset.categoryMove), Number(button.dataset.direction));
    });

    applyInitialState();
  </script>
